<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - Guild Control</title>
    <style>
        body {
            margin: 0;
            background: #0d0018;
            color: white;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background: #1b0030;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #9d00ff;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            margin-right: 20px;
        }
        .container {
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: #1b0030;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #330066;
            margin-bottom: 20px;
        }
        h1, h2 { color: #c78cff; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #330066;
        }
        th { color: #9d00ff; }
        .btn-delete {
            color: #ff4d4d;
            text-decoration: none;
            font-size: 12px;
        }
        .form-add {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #330066;
            background: #0d0018;
            color: white;
            flex: 1;
        }
        .btn-add {
            background: #9d00ff;
            color: white;
            border: 0;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="{{ url_for('dashboard') }}" style="font-size: 20px; color: #c78cff;">Guild Control</a>
    <div>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('auth.logout') }}" style="color: #ff4d4d;">Sair</a>
    </div>
</div>

<div class="container">
    <h1>Ranking & Membros</h1>
    
    <div class="card">
        <h2>Adicionar Novo Membro</h2>
        <form action="{{ url_for('membros.adicionar_membro') }}" method="POST" class="form-add">
            <input type="text" name="nick" placeholder="Nick do Jogador" required>
            <input type="text" name="line" placeholder="Nome da Line" required>
            <button type="submit" class="btn-add">Adicionar</button>
        </form>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Nick</th>
                    <th>Line</th>
                    <th>Pontos</th>
                    <th>Horas</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for membro in membros %}
                <tr>
                    <td>{{ membro.nick }}</td>
                    <td>{{ membro.line }}</td>
                    <td>{{ membro.pontos }}</td>
                    <td>{{ membro.horas }}h</td>
                    <td>
                        <a href="{{ url_for('membros.remover_membro', id=membro.id) }}" class="btn-delete" onclick="return confirm('Excluir membro?')">Excluir</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" style="text-align: center; color: #777;">Nenhum membro cadastrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
