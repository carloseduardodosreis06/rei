<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos - Guild Control</title>
    <style>
        body {
            margin: 0;
            background: #0d0018;
            color: white;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background: #1b0030;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #9d00ff;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            margin-right: 20px;
        }
        .container {
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: #1b0030;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #330066;
            transition: 0.3s;
        }
        .card:hover { border-color: #9d00ff; }
        .price { font-size: 32px; font-weight: bold; color: #9d00ff; margin: 15px 0; }
        .btn {
            background: #9d00ff;
            color: white;
            border: 0;
            border-radius: 8px;
            padding: 12px 20px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        .pix-area {
            margin-top: 40px;
            background: #1b0030;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="{{ url_for('dashboard') }}" style="font-size: 20px; color: #c78cff;">Guild Control</a>
    <div>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('auth.logout') }}" style="color: #ff4d4d;">Sair</a>
    </div>
</div>

<div class="container">
    <h1>Escolha seu Plano Premium</h1>
    
    <div class="grid">
        <div class="card">
            <h2>1 Semana</h2>
            <div class="price">R$ 15,00</div>
            <p>Acesso total por 7 dias</p>
            <button class="btn" onclick="showPix('15,00')">Selecionar</button>
        </div>
        <div class="card">
            <h2>20 Dias</h2>
            <div class="price">R$ 30,00</div>
            <p>Acesso total por 20 dias</p>
            <button class="btn" onclick="showPix('30,00')">Selecionar</button>
        </div>
        <div class="card">
            <h2>30 Dias</h2>
            <div class="price">R$ 60,00</div>
            <p>Acesso total por 30 dias</p>
            <button class="btn" onclick="showPix('60,00')">Selecionar</button>
        </div>
    </div>

    <div id="pixArea" class="pix-area">
        <h2>Pagamento via Pix</h2>
        <p>Valor selecionado: <strong id="selectedPrice"></strong></p>
        <div style="background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 15px 0;">
            <img src="data:image/png;base64,{{ qrcode_image }}" alt="QR Code Pix" style="width: 200px;">
        </div>
        <p>Chave Pix: <strong>{{ chave_pix }}</strong></p>
        <button class="btn" style="background: #00cc66;" onclick="confirmar()">Já realizei o pagamento</button>
    </div>
</div>

<script>
    function showPix(price) {
        document.getElementById('pixArea').style.display = 'block';
        document.getElementById('selectedPrice').innerText = 'R$ ' + price;
        window.scrollTo(0, document.body.scrollHeight);
    }

    function confirmar() {
        alert('Pagamento enviado para verificação!');
        window.location.href = "{{ url_for('dashboard') }}";
    }
</script>

</body>
</html>
